    <div id="toast-container"></div>

    <!-- Bootstrap core JavaScript-->

    <script src="{% static 'theme/vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>

    <!-- Custom scripts for all pages-->

    <script>
        $(document).ready(function(){
            const $inputs = $('.otp-input');
            const $hidden = $('#id_otp');

            function updateHiddenField(){
                let otpVal = '';
                $inputs.each(function(){
                    otpVal += $(this).val();
                });
                $hidden.val(otpVal);
            }

            $inputs.on('input', function(){
                this.value = this.value.replace(/\D/g,''); // digits only
                if(this.value.length === 1){
                    $(this).next('.otp-input').focus();
                }
                updateHiddenField();
            });

            $inputs.on('keydown', function(e){
                if(e.key === "Backspace" && this.value === ""){
                    $(this).prev('.otp-input').focus();
                }
            });

            $inputs.on('paste', function(e){
                e.preventDefault();
                let pasteData = (e.originalEvent || e).clipboardData.getData('text');
                pasteData = pasteData.replace(/\D/g,'').slice(0,6); // digits only, max 6
                $inputs.each(function(i){
                    $(this).val(pasteData[i] || '');
                });
                updateHiddenField();
                // focus next empty input
                $inputs.each(function(){
                    if(!this.value){
                        $(this).focus();
                        return false;
                    }
                });
            });
        });

        document.addEventListener("DOMContentLoaded", function(){
            var toastElList = [].slice.call(document.querySelectorAll('.toast'))
            var toastList = toastElList.map(function(toastEl) {
                var option = { delay: 3000 }; // Auto hide after 3 seconds
                var t = new bootstrap.Toast(toastEl, option)
                t.show();
                return t;
            });
        });
    </script>
    <script>
        function showToast(message, type="info") {
            console.log(message, type);

            let icon = "ℹ️";

            if(type==="success") icon="✔️";
            if(type==="error") icon="❌";
            if(type==="warning") icon="⚠️";

            let toast = $(`
                <div class="toast ${type}">
                    <span class="toast-icon">${icon}</span>
                    <span class="toast-message">${message}</span>
                </div>
            `);

            $("#toast-container").append(toast);

           /* toast.hide().fadeIn(300);

            setTimeout(function(){
                toast.fadeOut(400,function(){
                    $(this).remove();
                });
            },4000);*/
        }
    </script>
    <script>
        {% for message in messages %}
         showToast("{{ message }}","{{ message.tags }}");

        {% endfor %}
    </script>
