{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <meta name="author" content="">

    <title>Expenso Dashboard</title>

    <!-- Custom fonts for this template-->
    <link href="{% static 'theme/vendor/fontawesome-free/css/all.min.css' %}" rel="stylesheet" type="text/css">
    <link
        href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
        rel="stylesheet">

    <!-- Custom styles for this template-->
    <link href="{% static 'theme/css/sb-admin-2.min.css' %}" rel="stylesheet">
    <link href="{% static 'toast.css' %}" rel="stylesheet">
    <link href="{% static 'custom.css' %}" rel="stylesheet">

</head>

<body id="page-top">
    <div id="toast-container"></div>


{% block content %}
{% endblock %}


    <!-- Bootstrap core JavaScript-->
    <script src="{% static 'theme/vendor/jquery/jquery.min.js' %}"></script>
    <script src="{% static 'theme/vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>

    <!-- Core plugin JavaScript-->
    <script src="{% static 'theme/vendor/jquery-easing/jquery.easing.min.js' %}"></script>

    <!-- Custom scripts for all pages-->
    <script src="{% static 'theme/js/sb-admin-2.min.js' %}"></script>

    <!-- Page level plugins -->
    <script src="{% static 'theme/vendor/chart.js/Chart.min.js' %}"></script>

    <!-- Page level custom scripts -->
    <script src="{% static 'theme/js/demo/chart-area-demo.js' %}"></script>
    <script src="{% static 'theme/js/demo/chart-pie-demo.js' %}"></script>

    <script>
        function showToast(message, type="info") {

            let icon = "ℹ️";

            if(type==="success") icon="✔️";
            if(type==="error") icon="❌";
            if(type==="warning") icon="⚠️";

            let toast = $(`
                <div class="toast ${type}">
                    <span class="toast-icon">${icon}</span>
                    <span>${message}</span>
                </div>
            `);

            $("#toast-container").append(toast);

            toast.hide().fadeIn(300);

            setTimeout(function(){
                toast.fadeOut(400,function(){
                    $(this).remove();
                });
            },4000);
        }
    </script>

    <script>
        {% for message in messages %}
        showToast("{{ message }}","{{ message.tags }}");
        {% endfor %}
    </script>

</body>

</html>
